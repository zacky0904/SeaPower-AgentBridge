<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SP Advisor — 戰術海圖</title>
  <link rel="stylesheet" href="/vendor/leaflet/leaflet.css" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div id="app">
    <!-- 頂欄 -->
    <header id="topbar">
      <div class="brand">SP&nbsp;ADVISOR</div>
      <div id="mission-name">—</div>
      <div id="env" class="mono"></div>
      <div class="spacer"></div>
      <button id="ai-status" class="chip" title="AI 顧問設定"><span id="ai-dot"></span><span id="ai-label">AI</span></button>
      <button id="day-night" class="chip" title="日/夜配色">夜間</button>
      <div id="clock" class="mono">T + 00:00:00</div>
    </header>

    <!-- AI 顧問設定面板 -->
    <div id="ai-panel" class="hidden">
      <div class="aip-title">AI 顧問設定</div>
      <div class="aip-row"><label>供應商</label>
        <select id="aip-provider"><option value="anthropic">Anthropic (Claude)</option><option value="openai">OpenAI</option></select></div>
      <div class="aip-row"><label>模型</label><input id="aip-model" type="text" placeholder="claude-sonnet-5" /></div>
      <div class="aip-row"><label>金鑰</label><span id="aip-key">—</span></div>
      <div class="aip-row"><label>Debug</label><span class="aip-check"><input type="checkbox" id="aip-debug" /> 顯示每次送出的 prompt</span></div>
      <div class="aip-hint">金鑰請用環境變數（<span class="mono" id="aip-env">ANTHROPIC_API_KEY</span>）或 <span class="mono">advisor.config.json</span> 設定，不在此輸入以免外洩。</div>
      <div class="aip-btns"><button id="aip-save">儲存</button><button id="aip-test" class="pt-ghost">測試連線</button></div>
      <div id="aip-msg" class="aip-msg"></div>
    </div>

    <div id="main">
      <!-- 左：單位/編隊清單 -->
      <aside id="left">
        <div class="panel-title">任務目標</div>
        <div id="objectives"></div>
        <div class="panel-title">單位 / 編隊</div>
        <ul id="unit-list"></ul>
      </aside>

      <!-- 中：海圖 -->
      <section id="chart-wrap">
        <div id="map"></div>
        <canvas id="chart"></canvas>
        <div id="waiting" class="mono">等待遊戲連線…</div>
        <div id="plan-toolbar" class="hidden"></div>
        <div id="ctxmenu" class="hidden"></div>
        <div id="readout" class="mono"></div>
        <div id="chart-hint" class="mono">左鍵選單位 · 右鍵空海=移動 · Shift+右鍵=加航點 · 右鍵敵方=選武器交戰 · 右鍵己方=選單 · 雙擊/F 置中</div>
      </section>

      <!-- 右：聊天 -->
      <aside id="right">
        <div class="panel-title">戰術顧問</div>
        <div id="intel-box" class="hidden"></div>
        <div id="chat-log"></div>
        <form id="chat-form">
          <textarea id="chat-input" rows="2" placeholder="跟顧問討論戰況…（Enter 送出 / Shift+Enter 換行）"></textarea>
          <button type="submit">送出</button>
        </form>
      </aside>
    </div>

    <!-- 底：訊息日誌 -->
    <footer id="msglog" class="mono"></footer>
  </div>
  <script src="/vendor/leaflet/leaflet.js"></script>
  <script src="/app.js"></script>
</body>
</html>
